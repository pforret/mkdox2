# generated by pforret/mkdox

[project]
name = "{SITE_NAME}"
url = "http://{SITE_URL}"
description = "{SITE_NAME} by {USERNAME}"

[theme]
name = "material"
logo = "icon/android-chrome-192x192.png"
favicon = "icon/android-chrome-192x192.png"
features = [
  "content.code.copy",
  "header.autohide",
  "navigation.instant",
  "navigation.integrate",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.integrate",
]

[theme.palette]
primary = "red"

[theme.font]
text = "Nunito"

[markdown.extensions]
admonition = {}
abbr = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}

[markdown.extensions.toc]
permalink = true

[markdown.extensions."pymdownx.caret"]
[markdown.extensions."pymdownx.critic"]
[markdown.extensions."pymdownx.details"]
[markdown.extensions."pymdownx.keys"]
[markdown.extensions."pymdownx.mark"]
[markdown.extensions."pymdownx.snippets"]
[markdown.extensions."pymdownx.tilde"]

[markdown.extensions."pymdownx.tabbed"]
alternate_style = true

[markdown.extensions."pymdownx.tasklist"]
custom_checkbox = true

[markdown.extensions."pymdownx.emoji"]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[markdown.extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[plugins.search]

[plugins.awesome-pages]

[extra]
generator = false

[copyright]
text = "&copy; {CREATION_YEAR} {SITE_NAME} &bull; {USERNAME}"
