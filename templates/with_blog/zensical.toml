# generated by pforret/mkdox v{MKDOX_VERSION}

[project]
site_name = "{SITE_NAME}"
site_url = "{SITE_URL}"
site_description = "{SITE_NAME} by {USERNAME}"
copyright = "&copy; {CREATION_YEAR} {SITE_NAME} &bull; {USERNAME} &bull; built with mkdox v{MKDOX_VERSION}"

[project.theme]
name = "material"
logo = "icon/android-chrome-192x192.png"
favicon = "icon/android-chrome-192x192.png"
custom_dir = "docs/overrides"
features = [
  "announce.dismiss",
  "content.code.copy",
  "header.autohide",
  "navigation.instant",
  "navigation.integrate",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.integrate",
]

[[project.theme.palette]]
primary = "red"

[project.theme.font]
text = "Nunito"

[project.theme.icon]
repo = "fontawesome/brands/bitbucket"

[project.markdown.extensions]
admonition = {}
abbr = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}

[project.markdown.extensions.toc]
permalink = true

[project.markdown.extensions."pymdownx.caret"]
[project.markdown.extensions."pymdownx.critic"]
[project.markdown.extensions."pymdownx.details"]
[project.markdown.extensions."pymdownx.keys"]
[project.markdown.extensions."pymdownx.mark"]
[project.markdown.extensions."pymdownx.snippets"]
[project.markdown.extensions."pymdownx.tilde"]

[project.markdown.extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown.extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown.extensions."pymdownx.emoji"]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[project.markdown.extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.plugins.search]

[project.plugins.awesome-pages]

[project.plugins.blog]
blog_dir = "blog"
post_url_date_format = "yyyy/MM"
post_date_format = "medium"

[project.plugins.rss]
match_path = "blog/posts/.*"
json_feed_enabled = false
use_git = false

[project.plugins.rss.date_from_meta]
as_creation = "date"
as_update = "date"

[project.extra]
generator = false

[project.extra.consent]
title = "Cookie consent"
description = "We use cookies to recognize your repeated visits and preferences, as well as to measure the effectiveness of our documentation and whether users find what they're searching for. With your consent, you're helping us to make our documentation better."

[project.extra.analytics]
provider = "custom"
