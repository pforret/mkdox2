# generated by pforret/mkdox

[project]
site_name = "{SITE_NAME}"
site_url = "http://{SITE_URL}"
site_description = "{SITE_NAME} — committee knowledge base maintained by {USERNAME}"
copyright = "&copy; {CREATION_YEAR} {SITE_NAME}"

[project.theme]
name = "material"
custom_dir = "docs/overrides"
logo = "icon/android-chrome-192x192.png"
favicon = "icon/android-chrome-192x192.png"
features = [
  "announce.dismiss",
  "content.code.copy",
  "header.autohide",
  "navigation.instant",
  "navigation.integrate",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.integrate",
]

[[project.theme.palette]]
primary = "green"
accent = "orange"

[project.theme.font]
text = "Lora"
code = "Fira Code"

[project.markdown.extensions]
admonition = {}
abbr = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}

[project.markdown.extensions.toc]
permalink = true

[project.markdown.extensions."pymdownx.caret"]
[project.markdown.extensions."pymdownx.critic"]
[project.markdown.extensions."pymdownx.details"]
[project.markdown.extensions."pymdownx.keys"]
[project.markdown.extensions."pymdownx.mark"]
[project.markdown.extensions."pymdownx.snippets"]
[project.markdown.extensions."pymdownx.tilde"]

[project.markdown.extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown.extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown.extensions."pymdownx.emoji"]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[project.markdown.extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.plugins.search]

[project.plugins.awesome-pages]

[project.extra]
generator = false
